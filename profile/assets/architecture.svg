<svg width="900" height="1000" viewBox="0 0 900 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2128"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8b949e"/>
    </marker>
  </defs>

  <rect width="900" height="1000" fill="none"/>

  <!-- Nodes -->
  <g font-family="'Segoe UI', Arial, sans-serif">
    <!-- Client -->
    <rect x="300" y="20" width="300" height="70" rx="14" fill="url(#nodeGrad)" stroke="#30363d" stroke-width="1.5"/>
    <rect x="300" y="20" width="6" height="70" rx="3" fill="url(#accentGrad)"/>
    <text x="450" y="62" text-anchor="middle" font-size="20" font-weight="600" fill="#e6edf3">Client</text>

    <line x1="450" y1="90" x2="450" y2="140" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Frontend -->
    <rect x="300" y="140" width="300" height="70" rx="14" fill="url(#nodeGrad)" stroke="#30363d" stroke-width="1.5"/>
    <rect x="300" y="140" width="6" height="70" rx="3" fill="url(#accentGrad)"/>
    <text x="450" y="182" text-anchor="middle" font-size="20" font-weight="600" fill="#e6edf3">Frontend</text>

    <line x1="450" y1="210" x2="450" y2="260" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- API Gateway -->
    <rect x="300" y="260" width="300" height="70" rx="14" fill="url(#nodeGrad)" stroke="#30363d" stroke-width="1.5"/>
    <rect x="300" y="260" width="6" height="70" rx="3" fill="url(#accentGrad)"/>
    <text x="450" y="302" text-anchor="middle" font-size="20" font-weight="600" fill="#e6edf3">API Gateway</text>

    <line x1="450" y1="330" x2="450" y2="380" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Business Logic -->
    <rect x="300" y="380" width="300" height="70" rx="14" fill="url(#nodeGrad)" stroke="#30363d" stroke-width="1.5"/>
    <rect x="300" y="380" width="6" height="70" rx="3" fill="url(#accentGrad)"/>
    <text x="450" y="422" text-anchor="middle" font-size="20" font-weight="600" fill="#e6edf3">Business Logic</text>

    <line x1="450" y1="450" x2="450" y2="500" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Kafka -->
    <rect x="300" y="500" width="300" height="70" rx="14" fill="url(#nodeGrad)" stroke="#30363d" stroke-width="1.5"/>
    <rect x="300" y="500" width="6" height="70" rx="3" fill="url(#accentGrad)"/>
    <text x="450" y="542" text-anchor="middle" font-size="20" font-weight="600" fill="#e6edf3">Kafka</text>

    <line x1="450" y1="570" x2="450" y2="620" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Redis -->
    <rect x="300" y="620" width="300" height="70" rx="14" fill="url(#nodeGrad)" stroke="#30363d" stroke-width="1.5"/>
    <rect x="300" y="620" width="6" height="70" rx="3" fill="url(#accentGrad)"/>
    <text x="450" y="662" text-anchor="middle" font-size="20" font-weight="600" fill="#e6edf3">Redis</text>

    <line x1="450" y1="690" x2="450" y2="740" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Database -->
    <rect x="300" y="740" width="300" height="70" rx="14" fill="url(#nodeGrad)" stroke="#30363d" stroke-width="1.5"/>
    <rect x="300" y="740" width="6" height="70" rx="3" fill="url(#accentGrad)"/>
    <text x="450" y="782" text-anchor="middle" font-size="20" font-weight="600" fill="#e6edf3">Database</text>

    <line x1="450" y1="810" x2="450" y2="860" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Cloud -->
    <rect x="300" y="860" width="300" height="70" rx="14" fill="url(#nodeGrad)" stroke="#30363d" stroke-width="1.5"/>
    <rect x="300" y="860" width="6" height="70" rx="3" fill="url(#accentGrad)"/>
    <text x="450" y="902" text-anchor="middle" font-size="20" font-weight="600" fill="#e6edf3">Cloud Infrastructure</text>
  </g>
</svg>
